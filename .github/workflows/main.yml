# This is a basic workflow to help you get started with Actions

name: Build Workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: 
      - "main" 
  
 # pull_request:
   # branches: 
   #   - "main"


  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
 #   schedule:
 #     - cron: '49 9 * * *' # Minute Hour DOM Month DOW(0-7) This will run the workflow every day at 9:49AM (UTC time)

permissions: #to disallow this workflow from making any changes to the repository, we set the permissions to read-only.
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Code checkout
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Maven Build
        run: mvn install

      - name: Archive WAR files #by default, the workspace folder gets removed after the job finishes, so we need to save the generated WAR files as artifacts if we want to use them in another job
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

      - name: Notify if build fails
        if: failure() #this step will only run if the previous steps fail
        run: echo "Build failed! Please check the logs for more details."

  Testing:
    runs-on: ubuntu-latest
    needs: build # This job will only run if the "build" job completes successfully
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Maven Test
        run: mvn test

      - name: Checkstyle Check
        run: mvn checkstyle:checkstyle
