# This is a basic workflow to help you get started with Actions

name: Build Workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: 
      - "main" 
  
 # pull_request:
   # branches: 
   #   - "main"


  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
 #   schedule:
 #     - cron: '49 9 * * *' # Minute Hour DOM Month DOW(0-7) This will run the workflow every day at 9:49AM (UTC time)

permissions: #to disallow this workflow from making any changes to the repository, we set the permissions to read-only.
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Code checkout
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Maven Build
        run: mvn install

      - name: Archive WAR files #by default, the workspace folder gets removed after the job finishes, so we need to save the generated WAR files as artifacts if we want to use them in another job
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

      - name: Notify if build fails
        if: failure() #this step will only run if the previous steps fail
        run: echo "Build failed! Please check the logs for more details."

  Testing:
    runs-on: ubuntu-latest
    needs: build # This job will only run if the "build" job completes successfully
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Run tests on main branch
        if: github.ref == 'refs/heads/main' #this step will only run if the workflow is triggered by a push to the main branch
        run: mvn test

      - name: Run Checkstyle Check on main branche
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: Run tests on non-main branches
        if: github.ref != 'refs/heads/main' #this step will only run if the workflow is triggered by a push to a non-main branch
        run: echo "Skipping unit tests and code analysis for non-main branches."

  Security-Scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 #this is required for the security scan to work properly, as it needs access to the full commit history
      
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'fs' #this will scan the entire filesystem of the runner for vulnerabilities, including the code and dependencies of the project. You can also use 'image' to scan a container image or 'repository' to scan a Git repository.
          scan-ref: . #pwd
          format: json #this will output the scan results in JSON format, which can be easily parsed and analyzed. You can also use 'table' for a human-readable format or 'template' to customize the output using a Go template.
          exit-code: '0' #this will prevent the action from failing the job if any vulnerabilities are found. You can set it to '1' to fail the job on any vulnerability or '2' to fail only on high severity vulnerabilities.
          output: trivy-results.json #this will save the scan results to a file named trivy-results.json in the workspace, which can be used for further analysis or reporting. You can also use 'stdout' to print the results to the console.

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.json